<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <!-- 本地桌面应用，只加载本地 file: 资源、无远程内容。file:// 页面下 'self' 不匹配本地脚本，
       故显式放行 file:。 -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' file: data:; script-src 'self' file:; img-src 'self' file: data:; media-src 'self' file: data:; style-src 'self' 'unsafe-inline' file:;" />
  <title>熊猫桌宠</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="stage" class="stage">
    <div id="inner" class="inner">
      <!-- 点击熊猫展开的会话列表 -->
      <div id="panel" class="panel" hidden>
        <div class="panel-title">进行中的会话</div>
        <div id="list" class="list"></div>
      </div>

      <div class="panda-wrap">
        <div id="bubble" class="bubble" aria-hidden="true"></div>
        <div id="card" class="card" title="点击查看会话，拖动可移动">
          <img id="panda" class="panda" alt="panda" />
          <div id="placeholder" class="placeholder" hidden>
            <span id="placeholder-label"></span>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="imgproc.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
